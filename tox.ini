[tox]
no_package = True
skip_missing_interpreters = True
envlist = fmt, lint, unit, static, coverage-report
min_version = 4.0.0
requires = tox-uv

[vars]
src_path = {tox_root}/src/
tst_path = {tox_root}/tests/
all_path = {[vars]src_path} {[vars]tst_path}

[testenv]
runner = uv-venv-lock-runner
setenv =
  PYTHONPATH = {tox_root}:{tox_root}/lib:{[vars]src_path}
  PYTHONBREAKPOINT=ipdb.set_trace
  PY_COLORS=1
  charm: TEST_FILE=test_charm.py
  scaling: TEST_FILE=test_scaling.py
  upgrades: TEST_FILE=test_upgrades.py
  policy: TEST_FILE=test_policy.py
  usersync: TEST_FILE=test_usersync.py
  trino-catalog: TEST_FILE=test_trino_catalog.py
passenv =
  PYTHONPATH
  CHARM_BUILD_DIR
  MODEL_SETTINGS

[testenv:fmt]
description = Apply coding style standards to code
dependency_groups = fmt
commands =
    ruff check --select I001 --fix {[vars]src_path} {[vars]tst_path}
    ruff format {[vars]src_path} {[vars]tst_path}

[testenv:lint]
description = Check code against coding style standards
dependency_groups = lint
commands =
    ruff check {[vars]src_path} {[vars]tst_path}
    codespell {tox_root} --skip {tox_root}/.git --skip {tox_root}/.tox \
      --skip {tox_root}/build --skip {tox_root}/lib --skip {tox_root}/venv \
      --skip {tox_root}/.venv --skip {tox_root}/.mypy_cache \
      --skip {tox_root}/icon.svg \
      --ignore-words-list "ro"
    pyright {[vars]src_path}

[testenv:static]
description = Run static type checks and security analysis
dependency_groups = static
commands =
    bandit -c {tox_root}/pyproject.toml -r {[vars]src_path} {[vars]tst_path}

[testenv:unit]
description = Run unit tests
dependency_groups = unit
commands =
    coverage run --source={[vars]src_path} \
        -m pytest --ignore={[vars]tst_path}integration -v --tb native -s {posargs}
    coverage report

[testenv:coverage-report]
description = Create test coverage report
dependency_groups = coverage-report
commands =
    coverage report

[testenv:integration]
description = Run integration tests
dependency_groups = integration
commands =
   pytest {[vars]tst_path}integration -v --tb native --ignore={[vars]tst_path}unit --log-cli-level=INFO -s {posargs}

[testenv:integration-{charm,scaling,upgrades,policy,usersync,trino-catalog}]
description = Run integration tests
dependency_groups = integration-scenarios
commands =
   pytest {[vars]tst_path}integration/{env:TEST_FILE} -v --tb native --ignore={[vars]tst_path}unit --log-cli-level=INFO -s {posargs}
