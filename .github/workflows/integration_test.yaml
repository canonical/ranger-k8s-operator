name: Integration tests

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  workflow_call:

jobs:
  integration-tests:
    uses: canonical/operator-workflows/.github/workflows/integration_test.yaml@main
    secrets: inherit
    permissions:
      contents: read
      packages: write
      pull-requests: write
    with:
      runs-on: "self-hosted-linux-amd64-noble-xlarge"
      channel: 1.35-strict/stable
      modules: >-
        ["test_charm.py",
        "test_policy.py",
        "test_scaling.py",
        "test_trino_catalog.py",
        "test_upgrades.py",
        "test_usersync.py"]'
      juju-channel: 3/stable
      microk8s-addons: "dns ingress rbac storage metallb:10.15.119.2-10.15.119.4 registry"
      trivy-severity-config: CRITICAL
      with-uv: true
